nd .35s, box-shadow .35s; }\n    nav.scrolled { background:rgba(5,8,16,.93); backdrop-filter:blur(24px); box-shadow:0 1px 0 var(--border); }\n    .nav-logo { display:flex; align-items:center; gap:.7rem; text-decoration:none; }\n    .nav-logo img { height:42px; }\n    .nav-brand { display:flex; flex-direction:column; line-height:1.1; }\n    .nav-brand .name { font-size:1.05rem; font-weight:700; background:linear-gradient(120deg,var(--green),var(--blue)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }\n    .nav-brand .sub { font-size:.62rem; color:var(--muted); letter-spacing:.12em; text-transform:uppercase; }\n    .nav-links { display:flex; gap:2.5rem; list-style:none; }\n    .nav-links a { text-decoration:none; color:var(--muted); font-size:.88rem; font-weight:500; position:relative; transition:color .2s; }\n    .nav-links a::after { content:''; position:absolute; bottom:-4px; left:0; right:0; height:1px; background:linear-gradient(90deg,var(--green),var(--blue)); transform:scaleX(0); transition:transform .3s; transform-origin:left; }\n    body.ar .nav-links a::after { transform-origin:right; }\n    .nav-links a:hover { color:var(--text); }\n    .nav-links a:hover::after { transform:scaleX(1); }\n    .nav-right { display:flex; align-items:center; gap:1rem; }\n    .lang-btn { background:rgba(255,255,255,.05); border:1px solid var(--border); color:var(--muted); padding:.38rem .85rem; border-radius:7px; cursor:pointer; font-size:.82rem; font-weight:600; font-family:inherit; transition:all .2s; }\n    .lang-btn:hover { background:rgba(255,255,255,.09); color:var(--text); }\n    .nav-wa { display:inline-flex; align-items:center; gap:.4rem; background:linear-gradient(135deg,#25D366,#128C7E); color:#fff; padding:.5rem 1.15rem; border-radius:8px; text-decoration:none; font-size:.84rem; font-weight:600; transition:transform .2s, box-shadow .2s; box-shadow:0 2px 16px rgba(37,211,102,.28); }\n    .nav-wa:hover { transform:translateY(-2px); box-shadow:0 6px 28px rgba(37,211,102,.48); }\n\n    /* HERO */\n    #hero { min-height:100vh; display:flex; align-items:center; position:relative; overflow:hidden; }\n    #hero-canvas { position:absolute; inset:0; width:100%; height:100%; }\n    .orb { position:absolute; border-radius:50%; filter:blur(130px); opacity:.22; animation:orbpulse 9s ease-in-out infinite; }\n    .orb1 { width:680px; height:680px; background:radial-gradient(circle,#1a6cf0,transparent); top:-220px; left:-120px; }\n    .orb2 { width:540px; height:540px; background:radial-gradient(circle,#3ddf7a,transparent); bottom:-180px; right:-80px; animation-delay:-4.5s; }\n    .orb3 { width:300px; height:300px; background:radial-gradient(circle,#00d4ff,transparent); top:40%; right:20%; opacity:.12; animation-delay:-2s; }\n    @keyframes orbpulse { 0%,100%{ transform:translate(0,0) scale(1); } 50%{ transform:translate(25px,-35px) scale(1.07); } }\n    .hero-inner { position:relative; z-index:2; max-width:1200px; margin:0 auto; padding:6.5rem 3.5rem 4rem; width:100%; }\n    .chip { display:inline-flex; align-items:center; gap:.5rem; font-size:.72rem; font-weight:600; letter-spacing:.16em; text-transform:uppercase; color:var(--cyan); background:rgba(0,212,255,.07); border:1px solid rgba(0,212,255,.2); padding:.38rem 1rem; border-radius:100px; margin-bottom:2rem; opacity:0; transform:translateY(18px); animation:fadeup .7s ease forwards .25s; }\n    .chip-dot { width:6px; height:6px; border-radius:50%; background:var(--cyan); animation:blink 2.2s ease-in-out infinite; }\n    @keyframes blink { 0%,100%{opacity:1;} 50%{opacity:.3;} }\n    h1.hero-h { font-size:clamp(2.8rem,6vw,5.5rem); font-weight:700; line-height:1.05; margin-bottom:1.4rem; opacity:0; transform:translateY(28px); animation:fadeup .85s ease forwards .45s; }\n    .grad { background:linear-gradient(125deg,var(--green) 0%,var(--cyan) 48%,var(--blue) 100%); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }\n    .hero-sub { font-size:1.12rem; color:var(--muted); max-width:580px; line-height:1.78; margin-bottom:2.5rem; opacity:0; transform:translateY(28px); animation:fadeup .85s ease forwards .65s; }\n    .hero-btns { display:flex; align-items:center; gap:1rem; flex-wrap:wrap; opacity:0; transform:translateY(28px); animation:fadeup .85s ease forwards .82s; }\n    .btn-wa { display:inline-flex; align-items:center; gap:.6rem; background:linear-gradient(135deg,#25D366,#128C7E); color:#fff; padding:.9rem 2rem; border-radius:10px; font-size:.98rem; font-weight:600; text-decoration:none; box-shadow:0 0 32px rgba(37,211,102,.22); transition:transform .2s, box-shadow .2s; }\n    .btn-wa:hover { transform:translateY(-2px); box-shadow:0 8px 40px rgba(37,211,102,.45); }\n    .btn-ghost { display:inline-flex; align-items:center; gap:.6rem; background:transparent; border:1px solid rgba(255,255,255,.13); color:var(--text); padding:.9rem 2rem; border-radius:10px; font-size:.98rem; font-weight:500; text-decoration:none; transition:all .2s; }\n    .btn-ghost:hover { background:rgba(255,255,255,.05); border-color:rgba(255,255,255,.26); }\n    .hero-divider { width:100%; height:1px; background:var(--border); margin-top:4.5rem; }\n    .hero-stats { display:flex; gap:3.5rem; padding-top:2.5rem; flex-wrap:wrap; opacity:0; transform:translateY(18px); animation:fadeup .8s ease forwards 1.05s; }\n    .hstat .n { font-size:2.4rem; font-weight:700; line-height:1; background:linear-gradient(135deg,var(--green),var(--blue)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }\n    .hstat .l { font-size:.8rem; color:var(--muted); margin-top:.3rem; }\n    @keyframes fadeup { to { opacity:1; transform:translateY(0); } }\n\n    /* SECTIONS */\n    .sec-label { font-size:.72rem; font-weight:600; letter-spacing:.17em; text-transform:uppercase; color:var(--cyan); margin-bottom:.9rem; }\n    .sec-title { font-size:clamp(1.9rem,3.8vw,2.9rem); font-weight:700; lin ss=\"tw-title\">Tweaks<\u002Fdiv>\n  <div class=\"tw-row\"><label class=\"tw-lbl\">Accent Color<\u002Flabel>\n    <select class=\"tw-inp\" id=\"tw-accent\">\n      <option value=\"default\">Green + Blue (Default)<\u002Foption>\n      <option value=\"cyan\">Cyan + Blue<\u002Foption>\n      <option value=\"gold\">Gold + Blue<\u002Foption>\n    <\u002Fselect>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n\n\n<script>\n  // LANGUAGE\n  let lang = localStorage.getItem('sw-lang') || 'en';\n  function applyLang() {\n    const ar = lang === 'ar';\n    document.documentElement.lang = lang;\n    document.documentElement.dir = ar ? 'rtl' : 'ltr';\n    document.body.classList.toggle('ar', ar);\n    document.getElementById('langBtn').textContent = ar ? 'EN' : 'ع';\n    document.title = ar ? 'سمارت واي سيستمز | حلول أنظمة إلكترونية · المملكة' : 'SmartWay Systems | ELV Solutions · KSA';\n  }\n  function toggleLang() { lang = lang === 'en' ? 'ar' : 'en'; localStorage.setItem('sw-lang', lang); applyLang(); }\n  applyLang();\n\n  // NAV SCROLL\n  window.addEventListener('scroll', () => { document.getElementById('nav').classList.toggle('scrolled', scrollY > 55); });\n\n  // REVEAL\n  const io = new IntersectionObserver((entries) => {\n    entries.forEach((e, i) => { if (e.isIntersecting) { setTimeout(() => e.target.classList.add('in'), i * 80); io.unobserve(e.target); } });\n  }, { threshold: 0.08 });\n  document.querySelectorAll('.reveal').forEach(el => io.observe(el));\n\n  // CANVAS\n  (function() {\n    const c = document.getElementById('hero-canvas');\n    const ctx = c.getContext('2d');\n    let W, H, pts = [];\n    function resize() { W = c.width = c.offsetWidth; H = c.height = c.offsetHeight; }\n    function mkPts() { pts = []; const n = Math.min(Math.floor(W/16), 80); for(let i=0;i<n;i++) pts.push({x:Math.random()*W,y:Math.random()*H,vx:(Math.random()-.5)*.28,vy:(Math.random()-.5)*.28,r:Math.random()*1.3+.4,a:Math.random()*.55+.2}); }\n    function frame() {\n      ctx.clearRect(0,0,W,H);\n      ctx.strokeStyle='rgba(26,108,240,.04)'; ctx.lineWidth=1;\n      for(let x=0;x<W;x+=64){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}\n      for(let y=0;y<H;y+=64){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}\n      pts.forEach(p=>{p.x+=p.vx;p.y+=p.vy;if(p.x<0||p.x>W)p.vx*=-1;if(p.y<0||p.y>H)p.vy*=-1;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle=`rgba(61,223,122,${p.a})`;ctx.fill();});\n      for(let i=0;i<pts.length;i++)for(let j=i+1;j<pts.length;j++){const dx=pts[i].x-pts[j].x,dy=pts[i].y-pts[j].y,d=Math.sqrt(dx*dx+dy*dy);if(d<110){ctx.beginPath();ctx.strokeStyle=`rgba(26,108,240,${.13*(1-d/110)})`;ctx.lineWidth=.6;ctx.moveTo(pts[i].x,pts[i].y);ctx.lineTo(pts[j].x,pts[j].y);ctx.stroke();}}\n      requestAnimationFrame(frame);\n    }\n    resize(); mkPts(); frame();\n    window.addEventListener('resize', ()=>{resize();mkPts();});\n  })();\n\n  // FORM SUBMISSION\n  const form = document.getElementById('contact-form');\n  if (form) {\n    form.addEventListener('submit', async function(e) {\n      e.preventDefault();\n      const btn = form.querySelector('button[type=\"submit\"]');\n      btn.style.opacity = '.6'; btn.disabled = true;\n      try {\n        const res = await fetch(form.action, { method:'POST', body: new FormData(form), headers:{ Accept:'application/json' } });\n        if (res.ok) {\n          document.getElementById('form-success').style.display = 'block';\n          document.getElementById('form-error').style.display = 'none';\n          form.reset();\n        } else { throw new Error(); }\n      } catch(err) {\n        document.getElementById('form-error').style.display = 'block';\n        document.getElementById('form-success').style.display = 'none';\n      }\n      btn.style.opacity = '1'; btn.disabled = false;\n    });\n  }\n\n  // TWEAKS\n  window.addEventListener('message', e => {\n    if (e.data.type === '__activate_edit_mode') document.getElementById('tweaksPanel').classList.add('open');\n    if (e.data.type === '__deactivate_edit_mode') document.getElementById('tweaksPanel').classList.remove('open');\n  });\n  window.parent.postMessage({ type:'__edit_mode_available' }, '*');\n\n  document.getElementById('tw-accent').addEventListener('change', function() {\n    const r = document.documentElement;\n    if(this.value==='cyan'){r.style.setProperty('--green','#00d4ff');r.style.setProperty('--blue','#1a6cf0');}\n    else if(this.value==='gold'){r.style.setProperty('--green','#f0c23a');r.style.setProperty('--blue','#1a6cf0');}\n    else{r.style.setProperty('--green','#3ddf7a');r.style.setProperty('--blue','#1a6cf0');}\n  });\n<\u002Fscript>\n\n\n\n\n<\u002Fbody><\u002Fhtml>"
